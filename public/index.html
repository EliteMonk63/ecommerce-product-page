<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRIP — Premium Streetwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --dark: #0f0e0d;
      --accent: #e8391d;
      --muted: #9a9490;
      --border: #e2ddd8;
      --text: #1a1917;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 3rem;
      background: var(--dark);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: #fff;
      letter-spacing: 3px;
    }

    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #fff; }

    .cart-btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: opacity 0.2s;
    }

    .cart-btn:hover { opacity: 0.85; }
    .cart-count {
      background: #fff;
      color: var(--accent);
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      background: var(--dark);
      padding: 4rem 3rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
      overflow: hidden;
      position: relative;
    }

    .hero::before {
      content: 'DRIP';
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20rem;
      color: rgba(255,255,255,0.03);
      right: -2rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      letter-spacing: 10px;
    }

    .hero-text h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      color: #fff;
      line-height: 0.95;
      letter-spacing: 2px;
    }

    .hero-text h1 span { color: var(--accent); }
    .hero-text p {
      color: #aaa;
      font-size: 1rem;
      margin-top: 1rem;
      max-width: 400px;
      line-height: 1.6;
    }

    .hero-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border-radius: 3px;
      margin-bottom: 1rem;
    }

    .section { padding: 4rem 3rem; }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    .section-sub {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      animation: fadeUp 0.5s ease both;
    }

    .product-card:nth-child(1) { animation-delay: 0.05s; }
    .product-card:nth-child(2) { animation-delay: 0.1s; }
    .product-card:nth-child(3) { animation-delay: 0.15s; }
    .product-card:nth-child(4) { animation-delay: 0.2s; }
    .product-card:nth-child(5) { animation-delay: 0.25s; }
    .product-card:nth-child(6) { animation-delay: 0.3s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .product-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }

    .product-image {
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      position: relative;
      overflow: hidden;
    }

    .product-badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 3px;
    }

    .product-info { padding: 1.2rem; }

    .product-category {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .product-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .product-sizes {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .size-tag {
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      transition: all 0.15s;
    }

    .size-tag:hover, .size-tag.active {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .product-price {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .product-price .original {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: line-through;
      font-weight: 400;
      margin-left: 0.4rem;
    }

    .add-to-cart {
      background: var(--dark);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      transition: background 0.2s, transform 0.1s;
    }

    .add-to-cart:hover { background: var(--accent); }
    .add-to-cart:active { transform: scale(0.97); }

    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .cart-overlay.open { opacity: 1; pointer-events: all; }

    .cart-drawer {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100vh;
      background: var(--surface);
      z-index: 201;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .cart-drawer.open { transform: translateX(0); }

    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .cart-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--muted);
      transition: color 0.2s;
    }

    .close-btn:hover { color: var(--text); }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }

    .cart-item {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .cart-item-img {
      width: 60px; height: 60px;
      background: var(--bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 0.9rem; }
    .cart-item-size { font-size: 0.75rem; color: var(--muted); }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }

    .qty-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      width: 24px; height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .qty-btn:hover { background: var(--dark); color: #fff; border-color: var(--dark); }
    .qty-display { font-size: 0.85rem; font-weight: 600; min-width: 20px; text-align: center; }
    .cart-item-price { font-weight: 700; font-size: 0.95rem; }

    .remove-item {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.2rem;
      transition: color 0.2s;
    }

    .remove-item:hover { color: var(--accent); }

    .cart-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .cart-empty .icon { font-size: 3rem; margin-bottom: 1rem; }

    .cart-footer {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .cart-total span { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .cart-total strong { font-size: 1.4rem; font-weight: 700; }

    .checkout-btn {
      width: 100%;
      background: var(--dark);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      padding: 1rem;
      transition: background 0.2s;
    }

    .checkout-btn:hover { background: var(--accent); }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--dark);
      color: #fff;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 300;
      transition: transform 0.3s;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    footer {
      background: var(--dark);
      color: #aaa;
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
    }

    footer span { color: var(--accent); }

    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .hero { padding: 2.5rem 1.5rem; flex-direction: column; }
      .section { padding: 2.5rem 1.5rem; }
      .cart-drawer { width: 100%; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">DR<span>I</span>P</div>
  <ul class="nav-links">
    <li><a href="#">New Arrivals</a></li>
    <li><a href="#">Hoodies</a></li>
    <li><a href="#">Tees</a></li>
    <li><a href="#">Accessories</a></li>
  </ul>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Cart <span class="cart-count" id="cart-count">0</span>
  </button>
</nav>

<div class="hero">
  <div class="hero-text">
    <div class="hero-badge">New Drop 2026</div>
    <h1>WEAR<br/>YOUR<br/><span>VIBE</span></h1>
    <p>Premium streetwear for those who move different. Limited drops, unlimited style.</p>
  </div>
</div>

<div class="section">
  <div class="section-header">
    <h2 class="section-title">Latest Drop</h2>
    <span class="section-sub">6 Products</span>
  </div>
  <div class="products-grid" id="products-grid"></div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <strong id="cart-total">$0.00</strong>
    </div>
    <button class="checkout-btn" onclick="checkout()">Checkout Now</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>
  Built by <span>Kyle Fernandes</span> — Full Stack Developer
</footer>

<script>
  const products = [
    { id: 1, name: 'Oversized Noir Hoodie', category: 'Hoodies', price: 89, original: 120, emoji: '🖤', bg: '#1a1a2e', sizes: ['S','M','L','XL'], badge: 'Bestseller' },
    { id: 2, name: 'Acid Wash Tee', category: 'Tees', price: 45, original: null, emoji: '👕', bg: '#2d1b69', sizes: ['XS','S','M','L','XL'], badge: 'New' },
    { id: 3, name: 'Cargo Track Pants', category: 'Bottoms', price: 75, original: 95, emoji: '👖', bg: '#1a2e1a', sizes: ['S','M','L'], badge: 'Sale' },
    { id: 4, name: 'Logo Dad Cap', category: 'Accessories', price: 35, original: null, emoji: '🧢', bg: '#2e1a1a', sizes: ['One Size'], badge: null },
    { id: 5, name: 'Flame Graphic Tee', category: 'Tees', price: 55, original: null, emoji: '🔥', bg: '#2e2a1a', sizes: ['S','M','L','XL','XXL'], badge: 'New' },
    { id: 6, name: 'Puffer Vest', category: 'Outerwear', price: 110, original: 145, emoji: '🧥', bg: '#1a2a2e', sizes: ['S','M','L','XL'], badge: 'Sale' },
  ];

  let cart = [];
  let selectedSizes = {};

  function renderProducts() {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-image" style="background:${p.bg}">
          <span>${p.emoji}</span>
          ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
        </div>
        <div class="product-info">
          <div class="product-category">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-sizes">
            ${p.sizes.map(s => `<span class="size-tag" onclick="selectSize(${p.id}, '${s}', this)">${s}</span>`).join('')}
          </div>
          <div class="product-footer">
            <div class="product-price">
              $${p.price}
              ${p.original ? `<span class="original">$${p.original}</span>` : ''}
            </div>
            <button class="add-to-cart" onclick="addToCart(${p.id})">Add to Cart</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function selectSize(productId, size, el) {
    selectedSizes[productId] = size;
    const card = el.closest('.product-card');
    card.querySelectorAll('.size-tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function addToCart(productId) {
    const product = products.find(p => p.id === productId);
    const size = selectedSizes[productId] || product.sizes[0];
    const existing = cart.find(i => i.id === productId && i.size === size);
    if (existing) { existing.qty++; }
    else { cart.push({ ...product, size, qty: 1 }); }
    updateCart();
    showToast(`${product.emoji} ${product.name} added to cart!`);
  }

  function updateCart() {
    const count = cart.reduce((sum, i) => sum + i.qty, 0);
    document.getElementById('cart-count').textContent = count;
    const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
    document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
    const itemsEl = document.getElementById('cart-items');
    if (!cart.length) {
      itemsEl.innerHTML = `<div class="cart-empty"><div class="icon">🛒</div><p>Your cart is empty</p></div>`;
      return;
    }
    itemsEl.innerHTML = cart.map((item, idx) => `
      <div class="cart-item">
        <div class="cart-item-img">${item.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-size">Size: ${item.size}</div>
          <div class="cart-item-controls">
            <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
            <span class="qty-display">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
            <button class="remove-item" onclick="removeItem(${idx})">✕ Remove</button>
          </div>
        </div>
        <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
      </div>
    `).join('');
  }

  function changeQty(idx, delta) {
    cart[idx].qty += delta;
    if (cart[idx].qty <= 0) cart.splice(idx, 1);
    updateCart();
  }

  function removeItem(idx) {
    cart.splice(idx, 1);
    updateCart();
  }

  function toggleCart() {
    document.getElementById('cart-drawer').classList.toggle('open');
    document.getElementById('cart-overlay').classList.toggle('open');
  }

  function checkout() {
    if (!cart.length) { showToast('Your cart is empty!'); return; }
    showToast('🎉 Order placed! Thanks for shopping with DRIP');
    cart = [];
    updateCart();
    toggleCart();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  renderProducts();
  updateCart();
</script>
</body>
</html>
